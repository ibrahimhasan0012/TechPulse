name: TechPulse Article Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch new articles
        run: node scripts/fetch.js || true

      - name: Summarize with Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/summarize.js || true

      - name: Translate to Bangla with NLLB (Hugging Face)
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: node scripts/translate.js || true

      - name: Commit updated articles
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/articles.json
          git diff --staged --quiet || git commit -m "chore: auto-update articles [skip ci]"
          git pull --rebase
          git push

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: always()
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
